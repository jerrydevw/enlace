services:
  db:
    image: postgres:17-alpine
    container_name: enlace-db
    environment:
      POSTGRES_DB: enlace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enlace"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: enlace-localstack
    ports:
      - "4566:4566"            # LocalStack Gateway
    environment:
      - SERVICES=sqs,s3,ivs    # Note: IVS is community/pro, but we can mock it
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./docker/localstack/init-aws.sh:/etc/localstack/init-aws.d/init-aws.sh"
      - "/var/run/docker.sock:/var/run/docker.sock"

