#      - APP_BASE_URL=http://localhost:8080
#    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: enlace-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

volumes:
  postgres_data:
