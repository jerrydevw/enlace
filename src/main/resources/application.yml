spring:
  main:
    lazy-initialization: false
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/enlace}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true     # útil na primeira execução ou em dev
    validate-on-migrate: true
    # Opcional: para ver mais detalhes no log
    # logging:
    #   level:
    #     org.flywaydb: DEBUG

    # resto das suas configs (cloud.aws, jwt, etc.)
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region:
        static: ${AWS_REGION:}

aws:
  account-id: ${AWS_ACCOUNT_ID:}
  region: ${AWS_REGION:}
  access-key: ${AWS_ACCESS_KEY_ID:}
  secret-key: ${AWS_SECRET_ACCESS_KEY:}
  ivs:
    recording-bucket: ${IVS_RECORDING_BUCKET:}
    recording-role-arn: ${IVS_RECORDING_ROLE_ARN:}
    recording-configuration-arn: ${IVS_RECORDING_CONFIGURATION_ARN:}

  sqs:
    provisioning-queue-url: ${SQS_PROVISIONING_QUEUE_URL:}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  viewer-token-ttl-hours: ${VIEWER_TOKEN_TTL_HOURS:72}
  jwt:
    secret: ${JWT_SECRET:enlace-super-secret-key-must-be-at-least-32-chars-long}
    expiration-hours: ${JWT_EXPIRATION_HOURS:4}
  rate-limit:
    max-attempts-per-minute: ${RATE_LIMIT_MAX_ATTEMPTS:10}
api:
  key: ${ENLACE_API_KEY:enlace-dev-key-troque-em-prod}

enlace:
  internal-api-key: ${ENLACE_INTERNAL_API_KEY:enlace-internal-dev}

logging:
  level:
    com.enlace: INFO