spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  main:
    lazy-initialization: false
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/enlace}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true     # útil na primeira execução ou em dev
    baseline-version: 0
    validate-on-migrate: true
    # Opcional: para ver mais detalhes no log
    # logging:
    #   level:
    #     org.flywaydb: DEBUG

    # resto das suas configs (cloud.aws, jwt, etc.)
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region:
        static: ${AWS_REGION:}
      sqs:
        endpoint: ${AWS_SQS_ENDPOINT:}

aws:
  region: ${AWS_REGION:}
  access-key: ${AWS_ACCESS_KEY_ID:}
  secret-key: ${AWS_SECRET_ACCESS_KEY:}
  account-id: ${AWS_ACCOUNT_ID:}
  secrets:
    jwt-private-key-arn: ${JWT_PRIVATE_KEY_ARN:arn:aws:secretsmanager:us-east-1:983004128117:secret:enlace/jwt/private-key-EGC081}
    jwt-public-key-arn: ${JWT_PUBLIC_KEY_ARN:arn:aws:secretsmanager:us-east-1:983004128117:secret:enlace/jwt/public-key-RaVk4C}
    jwt-secret-arn: ${JWT_SECRET_ARN:arn:aws:secretsmanager:us-east-1:983004128117:secret:enlace/jwt/secret-ldIMkg}
  ivs:
    recording-bucket: ${IVS_RECORDING_BUCKET:}
    recording-role-arn: ${IVS_RECORDING_ROLE_ARN:}
    recording-configuration-arn: ${IVS_RECORDING_CONFIGURATION_ARN}
  sqs:
    region: ${AWS_SQS_REGION:${AWS_REGION:}}
    provisioning-queue-url: ${SQS_PROVISIONING_QUEUE_URL:}
    ivs-events-queue-url: ${SQS_IVS_EVENTS_QUEUE_URL:}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  viewer-token-ttl-hours: ${VIEWER_TOKEN_TTL_HOURS:72}
  jwt:
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}
  rate-limit:
    max-attempts-per-minute: ${RATE_LIMIT_MAX_ATTEMPTS:10}

resilience4j:
  circuitbreaker:
    instances:
      ivs:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  retry:
    instances:
      ivs:
        maxAttempts: 3
        waitDuration: 1s
  metrics:
    enabled: true
    legacy:
      enabled: false
    binders:
      enabled: true

logging:
  level:
    com.enlace: INFO